# Copy to config.yaml and adjust as needed.

ollama:
  base_url: "http://localhost:11434"
  chat_model: "llama3.2:latest"
  embedding_model: "nomic-embed-text:latest"
  # Local chat generation regularly takes 40-90s+ on modest hardware. This
  # must be >= frontend.request_timeout below, or the backend will give up
  # on Ollama before the frontend gives up on the backend.
  request_timeout: 180
  # Caps how many tokens a single answer can generate - the single biggest
  # lever on perceived response speed for local models. 512 is enough for a
  # thorough lore answer without letting the model ramble for minutes.
  num_predict: 512
  # How long Ollama keeps the model loaded in memory between requests, so
  # back-to-back questions don't pay the multi-second reload cost each time.
  keep_alive: "30m"

chunking:
  chunk_size: 800
  chunk_overlap: 150

vector_db:
  path: "./vector_db"
  collection_name: "buddharauer_docs"

data_storage:
  path: "./data_storage/buddharauer.db"

paths:
  data_dir: "./data"
  processed_dir: "./processed"

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:7860"

frontend:
  api_base_url: "http://localhost:8000"
  port: 7860
  # Local LLM generation can take well over a minute for a single answer;
  # give the frontend's HTTP client enough headroom that it doesn't
  # time out while the backend is still legitimately working.
  request_timeout: 180

logging:
  level: "INFO"

rag:
  # Minimum cosine similarity (vector_db uses hnsw:space=cosine) a retrieved
  # chunk must clear to be treated as relevant. Below this, the chat falls
  # back to "I don't have information about that." Tuned empirically against
  # nomic-embed-text: relevant matches scored ~0.6-0.7, irrelevant ~0.45-0.5.
  min_score: 0.55
  # Caps how many prior conversation turns are resent to the model each
  # request. On CPU-bound Ollama installs, prompt evaluation time scales with
  # context size, so an unbounded history makes long conversations get slower
  # every turn. Retrieval (and therefore answer grounding) is unaffected -
  # this only trims how much *prior chat* is replayed back to the model.
  max_history_turns: 3

auth:
  # Required to enable PDF upload. Left as "changeme" (or unset), uploads are
  # rejected entirely - set this to a real value in your local config.yaml.
  admin_password: "changeme"
