<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}Buddharauer Wiki{% endblock %}</title>
    <style>
        body { font-family: Georgia, serif; max-width: 1200px; margin: 2rem auto; padding: 0 1rem; color: #222; }
        .topnav { margin-bottom: 1.5rem; border-bottom: 2px solid #8b0000; padding-bottom: 0.5rem; }
        .topnav a { margin-right: 1rem; text-decoration: none; color: #8b0000; font-weight: bold; }
        h1 { border-bottom: 1px solid #ccc; padding-bottom: 0.3rem; }
        .badge { display: inline-block; background: #eee; border-radius: 4px; padding: 0.1rem 0.5rem; font-size: 0.85rem; text-transform: capitalize; }
        ul.entity-list { list-style: none; padding: 0; }
        ul.entity-list li { padding: 0.3rem 0; }
        ul.entity-grid { list-style: none; padding: 0; display: flex; flex-wrap: wrap; gap: 0.4rem; }
        ul.entity-grid li { padding: 0; }
        ul.citations { list-style: none; padding: 0; }
        ul.citations li { padding: 0.2rem 0; }
        a { color: #8b0000; }
        .wiki-btn {
            display: inline-block;
            padding: 0.4rem 0.9rem;
            background: #8b0000;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.15s ease;
        }
        .wiki-btn:hover { background: #b22222; color: #fff; }

        /* Per-type entity colors, so different kinds of entities are
           distinguishable at a glance instead of one bright red for
           everything. real-person is deliberately muted - it's meta/credits
           content, not story cast. */
        .wiki-btn.type-character { background: #8b0000; }
        .wiki-btn.type-character:hover { background: #b22222; }
        .wiki-btn.type-creature { background: #5b3a7e; }
        .wiki-btn.type-creature:hover { background: #7a55a3; }
        .wiki-btn.type-faction { background: #4a4a4a; }
        .wiki-btn.type-faction:hover { background: #6a6a6a; }
        .wiki-btn.type-item { background: #96731a; }
        .wiki-btn.type-item:hover { background: #b78d24; }
        .wiki-btn.type-location { background: #1f6f78; }
        .wiki-btn.type-location:hover { background: #2b909b; }
        .wiki-btn.type-event { background: #a35a1f; }
        .wiki-btn.type-event:hover { background: #c47029; }
        .wiki-btn.type-real-person { background: #8a8577; }
        .wiki-btn.type-real-person:hover { background: #a19c8c; }
        .wiki-btn.type-other { background: #6b7280; }
        .wiki-btn.type-other:hover { background: #868c96; }

        /* Sidebar + main content layout */
        .wiki-layout { display: flex; gap: 2rem; align-items: flex-start; }
        .wiki-sidebar {
            flex: 0 0 220px;
            position: sticky;
            top: 1rem;
        }
        .wiki-sidebar h3 { margin-top: 1.2rem; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.03em; color: #666; border: none; }
        .wiki-sidebar ul { list-style: none; padding: 0; margin: 0.4rem 0; }
        .wiki-sidebar li { padding: 0.25rem 0; }
        .wiki-sidebar .count { color: #888; font-size: 0.85rem; }
        #wiki-search {
            width: 100%;
            box-sizing: border-box;
            padding: 0.5rem 0.6rem;
            font-family: inherit;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .wiki-main { flex: 1; min-width: 0; }

        /* Breadcrumbs */
        .breadcrumb { margin-bottom: 1rem; font-size: 0.9rem; color: #666; }
        .breadcrumb a { color: #8b0000; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        /* Wiki landing page stats */
        .wiki-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin: 1.5rem 0;
            padding: 1rem 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }
        .wiki-stats .stat { text-align: center; min-width: 80px; }
        .wiki-stats .stat strong { display: block; font-size: 1.6rem; color: #8b0000; }
        .wiki-stats .stat span { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.03em; color: #666; }

        /* Entity page infobox */
        .entity-page { display: flex; gap: 2rem; align-items: flex-start; }
        .entity-body { flex: 1; min-width: 0; }
        .infobox {
            flex: 0 0 240px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 1rem;
            background: #faf7f2;
        }
        .infobox h3 { margin-top: 0; border: none; }
        .infobox dt { font-weight: bold; font-size: 0.85rem; text-transform: uppercase; color: #666; margin-top: 0.7rem; }
        .infobox dd { margin: 0.2rem 0 0 0; }
        .infobox ul { list-style: none; padding: 0; margin: 0; }
    </style>
</head>
<body>
    <nav class="topnav">
        <a href="/wiki">Wiki Home</a>
        <a href="{{ frontend_url }}">Chat</a>
    </nav>
    <div class="wiki-layout">
        <aside class="wiki-sidebar">
            <input type="text" id="wiki-search" placeholder="Search entities...">
            <h3>Categories</h3>
            <ul>
                {% for cat, count in category_counts.items() %}
                <li><a href="/wiki/category/{{ cat }}">{{ cat|capitalize }}s</a> <span class="count">({{ count }})</span></li>
                {% else %}
                <li>No categories yet.</li>
                {% endfor %}
            </ul>
        </aside>
        <main class="wiki-main">
            {% block breadcrumb %}{% endblock %}
            {% block content %}{% endblock %}
        </main>
    </div>
    <script>
        document.addEventListener('input', function (e) {
            if (e.target.id !== 'wiki-search') {
                return;
            }
            const query = e.target.value.trim().toLowerCase();
            document.querySelectorAll('.entity-grid li, .entity-list li').forEach(function (li) {
                const text = li.textContent.toLowerCase();
                li.style.display = (!query || text.includes(query)) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
