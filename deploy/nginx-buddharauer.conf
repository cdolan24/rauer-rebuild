# Reverse proxy for Buddharauer. Install to /etc/nginx/sites-available/ and
# symlink into sites-enabled/.
#
# Deliberately HTTP-only as shipped - do NOT add a "listen 443 ssl" block by
# hand. nginx refuses to start ("no ssl_certificate is defined for the
# listen ... ssl directive") if a server block declares TLS before a
# certificate exists, which is exactly the state this file would be in
# before Certbot has run. Get the site working over plain HTTP first, then
# run `certbot --nginx -d your-domain.example.com` - it edits this file in
# place to add the HTTPS server block (with real certificate paths) and the
# HTTP -> HTTPS redirect for you.
#
# Path routing: /api/* and /wiki* go to the backend (FastAPI, 127.0.0.1:8000);
# everything else goes to the frontend (Gradio, 127.0.0.1:7860). Both app
# ports are localhost-only - only this proxy is internet-facing.

server {
    listen 80;
    server_name your-domain.example.com;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Local LLM generation can take well over a minute - don't let the
        # proxy time out a request the backend is still legitimately working.
        proxy_read_timeout 300s;
    }

    location /wiki {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:7860;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Gradio uses websockets for its queue/streaming - required for the
        # connection upgrade to work through the proxy.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
